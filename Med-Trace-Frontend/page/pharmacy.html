<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Med-Trace | Pharmacies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-text: #cbd5e1;
            --sidebar-hover: #1e293b;
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --danger: #ef4444;
            --info: #3b82f6;
            --card-bg: #ffffff;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text);
            height: 100vh; position: fixed; padding: 32px 24px; transition: width 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; }

        .logo {
            font-size: 1.9rem; font-weight: 700;
            background: linear-gradient(90deg, var(--primary), #10b981);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .sidebar nav a {
            display: flex; align-items: center; gap: 14px; color: var(--sidebar-text);
            text-decoration: none; padding: 14px 16px; border-radius: 10px;
            margin: 4px 0; font-size: 0.98rem; transition: all 0.2s;
        }

        .sidebar nav a:hover, .sidebar nav a.active { background: var(--sidebar-hover); color: white; }
        .sidebar nav a i { width: 20px; text-align: center; }
        .sidebar .logout { margin-top: auto; color: #f87171 !important; }

        /* ── Main Content ── */
        .main-content { margin-left: 260px; flex: 1; padding: 40px 48px; }

        .page-header { margin-bottom: 36px; }
        .page-header h1 { font-size: 2.1rem; font-weight: 600; }
        .page-header p { color: var(--text-light); margin-top: 6px; }

        /* Cards & Form */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 40px; }

        .card {
            background: var(--card-bg); border-radius: 16px; padding: 32px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08); border: 1px solid var(--border);
            transition: transform 0.25s ease;
        }

        .card h3 { font-size: 1.35rem; margin-bottom: 24px; color: var(--text); display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text-light); font-size: 0.92rem; }

        input[type="text"], input[type="tel"] {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 1rem; background: #f9fafb;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,204,113,0.15); }

        .button-group { display: flex; gap: 12px; margin-top: 28px; }
        button { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; }

        #saveBtn { background: var(--primary-dark); }
        #updateBtn { background: var(--info); }
        #deleteBtn { background: var(--danger); }

        /* Map Styling */
        #map { height: 450px; width: 100%; border-radius: 12px; border: 1px solid var(--border); z-index: 1; }

        /* Table Styling */
        .table-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.08); border: 1px solid var(--border); }
        .table-header { padding: 20px 28px; background: #0f172a; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 28px; text-align: left; }
        thead th { background: #f1f5f9; color: var(--text); font-size: 0.82rem; text-transform: uppercase; }
        tbody tr { border-bottom: 1px solid var(--border); }
        .edit-btn { background: #dbeafe; color: #1e40af; border:none; padding: 6px 12px; border-radius: 6px; cursor:pointer; }

        @media (max-width: 992px) {
            .sidebar { width: 80px; } .sidebar-header span, .sidebar nav a span { display: none; }
            .main-content { margin-left: 80px; } .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-heartbeat" style="font-size:2rem;color:var(--primary);"></i>
        <span class="logo">Med-Trace</span>
    </div>
    <nav>
        <a href="../index.html"><i class="fas fa-home"></i><span>Dashboard</span></a>
        <a href="medicine.html"><i class="fas fa-pills"></i><span>Medicines</span></a>
        <a href="supplier.html"><i class="fas fa-truck"></i><span>Suppliers</span></a>
        <a href="pharmacy.html" class="active"><i class="fas fa-store"></i><span>Pharmacies</span></a>
        <a href="../login.html" class="logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </nav>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Pharmacy Network</h1>
        <p>Manage and locate registered pharmacies across the country</p>
    </div>

    <div class="content-grid">
        <div class="card">
            <h3><i class="fas fa-edit"></i> Pharmacy Details</h3>
            <div class="form-group">
                <label>Pharmacy ID</label>
                <input id="ph-id" type="text" readonly placeholder="Auto-generated">
            </div>
            <div class="form-group">
                <label>Pharmacy Name *</label>
                <input id="ph-name" type="text" placeholder="e.g. LifeCare Pharmacy">
            </div>
            <div class="form-group">
                <label>License Number</label>
                <input id="ph-license" type="text" placeholder="e.g. PHM-9982">
            </div>
            <div class="form-group">
                <label>Location / City</label>
                <input id="ph-location" type="text" placeholder="e.g. Colombo, Galle">
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input id="ph-contact" type="tel" placeholder="e.g. 0112 345 678">
            </div>
            <div class="button-group">
                <button id="saveBtn" onclick="savePharmacy()"><i class="fas fa-save"></i> Save</button>
                <button id="updateBtn" onclick="updatePharmacy()"><i class="fas fa-sync"></i> Update</button>
                <button id="deleteBtn" onclick="deletePharmacy()"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>

        <div class="card" style="padding: 10px;">
            <div id="map"></div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-header"><h3>Registered Pharmacies</h3></div>
        <table id="pharmacyTable">
            <thead>
            <tr><th>ID</th><th>Name</th><th>License</th><th>Location</th><th>Contact</th><th>Actions</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="../js/jquery-3.6.4.min.js"></script>
<script>
    const API_URL = "http://localhost:8085/api/pharmacies";
    let map, marker;

    $(document).ready(() => {
        initMap();
        getAll();
    });

    // 1. Initialize Map
    function initMap() {
        map = L.map('map').setView([7.8731, 80.7718], 7); // Center of Sri Lanka
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
    }

    // 2. Geocode Location Name and update map
    async function updateMapLocation(locationName) {
        if(!locationName) return;
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${locationName + ", Sri Lanka"}`);
            const data = await response.json();
            if (data.length > 0) {
                const lat = data[0].lat; const lon = data[0].lon;
                if (marker) map.removeLayer(marker);
                map.setView([lat, lon], 13);
                marker = L.marker([lat, lon]).addTo(map).bindPopup(locationName).openPopup();
            }
        } catch (e) { console.log("Map error: ", e); }
    }

    // 3. CRUD Operations
    function getAll() {
        $.get(API_URL, (resp) => {
            let rows = "";
            resp.data.forEach(p => {
                rows += `<tr><td>${p.id}</td><td>${p.pharmacyName}</td><td>${p.licenseNumber}</td><td>${p.location}</td><td>${p.contactNumber}</td>
                <td><button class="edit-btn" onclick="loadFields(${p.id},'${p.pharmacyName}','${p.licenseNumber}','${p.location}','${p.contactNumber}')">Edit</button></td></tr>`;
            });
            $("#tableBody").html(rows);
        });
    }

    function savePharmacy() {
        const data = {
            pharmacyName: $("#ph-name").val(),
            licenseNumber: $("#ph-license").val(),
            location: $("#ph-location").val(),
            contactNumber: $("#ph-contact").val() };
        $.ajax({
            url: API_URL,
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data), success: () => { alert("Pharmacy Registered!"); getAll(); clear(); } });
    }

    function updatePharmacy() {
        const id = $("#ph-id").val();
        const data = {
            pharmacyName: $("#ph-name").val(),
            licenseNumber: $("#ph-license").val(),
            location: $("#ph-location").val(),
            contactNumber: $("#ph-contact").val() };
        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data), success: () => { alert("Updated!"); getAll(); clear(); } });
    }

    function deletePharmacy() {
        const id = $("#ph-id").val();
        if(confirm("Are you sure?")) {
            $.ajax({ url: `${API_URL}/${id}`,
                method: 'DELETE', success: () => { alert("Deleted!"); getAll(); clear(); } });
        }
    }

    function loadFields(id, n, l, loc, c) {
        $("#ph-id").val(id); $("#ph-name").val(n); $("#ph-license").val(l); $("#ph-location").val(loc); $("#ph-contact").val(c);
        updateMapLocation(loc);
    }

    function clear() { $("input").val(""); if(marker) map.removeLayer(marker); map.setView([7.8731, 80.7718], 7); }
</script>
</body>
</html>
