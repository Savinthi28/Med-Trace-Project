<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Med-Trace | User Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root { --primary: #2ecc71; --dark: #0f172a; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

    .nav { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

    .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; }
    h2 { margin-top: 0; color: var(--dark); border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; }

    /* Form Styles */
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    .btn-save { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; }

    /* Table Styles */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
    th { background: #f1f5f9; color: #475569; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .badge-admin { background: #dbeafe; color: #1e40af; }
    .badge-consumer { background: #fef3c7; color: #92400e; }
    .btn-delete { color: #ef4444; cursor: pointer; border: none; background: none; font-size: 1.1rem; }
  </style>
</head>
<body>

<div class="nav">
  <div style="font-size: 1.4rem; font-weight: 700;">Med-Trace <span style="font-weight: 300;">| Admin</span></div>
  <a href="../index.html" style="color: white; text-decoration: none;"><i class="fas fa-home"></i> Dashboard</a>
</div>

<div class="container">
  <div class="card">
    <h2><i class="fas fa-user-plus"></i> Add New System User</h2>
    <div class="form-grid">
      <input type="text" id="username" placeholder="Username (Unique)">
      <input type="password" id="password" placeholder="Password">
      <input type="text" id="fullname" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email Address">
      <select id="role">
        <option value="ADMIN">Staff / Pharmacist (ADMIN)</option>
        <option value="CONSUMER">General Customer (CONSUMER)</option>
      </select>
    </div>
    <button class="btn-save" onclick="saveUser()">Register User</button>
  </div>

  <div class="card">
    <h2><i class="fas fa-users"></i> Registered Users</h2>
    <table id="userTable">
      <thead>
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Username</th>
        <th>Role</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody id="userTableBody">
      </tbody>
    </table>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script>
  const API_URL = "http://localhost:8085/api/users";

  $(document).ready(() => {
    loadUsers();
  });

  function loadUsers() {
    $.get(API_URL, (resp) => {
      const users = resp.data;
      let rows = "";
      users.forEach(user => {
        const badgeClass = user.role === 'ADMIN' ? 'badge-admin' : 'badge-consumer';
        rows += `
                    <tr>
                        <td>${user.id}</td>
                        <td><strong>${user.fullName}</strong></td>
                        <td>${user.username}</td>
                        <td><span class="badge ${badgeClass}">${user.role}</span></td>
                        <td>${user.email}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteUser(${user.id})">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
      });
      $("#userTableBody").html(rows);
    });
  }

  function saveUser() {
    const data = {
      username: $("#username").val(),
      password: $("#password").val(),
      fullName: $("#fullname").val(),
      email: $("#email").val(),
      role: $("#role").val()
    };

    if(!data.username || !data.password) {
      alert("Username and Password are required!");
      return;
    }

    $.ajax({
      url: `${API_URL}/register`,
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(data),
      success: () => {
        alert("User added successfully!");
        clearForm();
        loadUsers();
      },
      error: () => alert("Error: Could not add user. Username might be taken.")
    });
  }

  function deleteUser(id) {
    if(confirm("Are you sure you want to delete this user?")) {
      $.ajax({
        url: `${API_URL}/${id}`,
        method: 'DELETE',
        success: () => {
          alert("User deleted!");
          loadUsers();
        }
      });
    }
  }

  function clearForm() {
    $("#username, #password, #fullname, #email").val("");
  }
</script>

</body>
</html>
