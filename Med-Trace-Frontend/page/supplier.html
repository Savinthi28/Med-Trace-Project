<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Med-Trace | Suppliers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-text: #cbd5e1;
            --sidebar-hover: #1e293b;
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --danger: #ef4444;
            --info: #3b82f6;
            --card-bg: #ffffff;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar ──────────────────────────────────────── */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            padding: 32px 24px;
            transition: width 0.3s ease;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--sidebar-text);
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 10px;
            margin: 4px 0;
            font-size: 0.98rem;
            transition: all 0.2s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background: var(--sidebar-hover);
            color: white;
        }

        .sidebar nav a i { width: 20px; text-align: center; }

        .sidebar .logout {
            margin-top: auto;
            color: #f87171 !important;
        }
        .sidebar .logout:hover {
            background: rgba(248,113,113,0.12) !important;
        }

        /* Main Content ─────────────────────────────────── */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px 48px;
        }

        .page-header {
            margin-bottom: 36px;
        }

        .page-header h1 {
            font-size: 2.1rem;
            font-weight: 600;
        }

        .page-header p {
            color: var(--text-light);
            margin-top: 6px;
        }

        /* Search Bar */
        .search-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 28px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: none;
            border-radius: 10px;
            background: #f1f5f9;
            font-size: 1.05rem;
        }

        .search-box input::placeholder {
            color: var(--text-light);
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.3rem;
        }

        /* Form Card */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            transition: transform 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card h3 {
            font-size: 1.35rem;
            margin-bottom: 24px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-light);
            font-size: 0.92rem;
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: #f9fafb;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        #saveBtn   { background: var(--primary-dark); }
        #updateBtn { background: var(--info); }
        #deleteBtn { background: var(--danger); }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Table */
        .table-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .table-header {
            padding: 20px 28px;
            background: linear-gradient(90deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 { margin: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 28px;
            text-align: left;
        }

        thead th {
            background: #f1f5f9;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn   { background: #dbeafe; color: #1e40af; }
        .edit-btn:hover   { background: #bfdbfe; }

        .delete-btn { background: #fee2e2; color: #991b1b; }
        .delete-btn:hover { background: #fecaca; }

        /* Responsive */
        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
                padding: 32px 16px;
            }
            .sidebar-header span,
            .sidebar nav a span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
                padding: 32px 24px;
            }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 24px 20px;
            }
            .main-content {
                margin-left: 0;
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-heartbeat" style="font-size:2rem;color:var(--primary);"></i>
        <span class="logo">Med-Trace</span>
    </div>
    <nav>
        <a href="../index.html"><i class="fas fa-home"></i><span>Dashboard</span></a>
        <a href="medicine.html"><i class="fas fa-pills"></i><span>Medicines</span></a>
        <a href="supplier.html" class="active"><i class="fas fa-truck"></i><span>Suppliers</span></a>
        <a href="pharmacy.html"><i class="fas fa-store"></i><span>Pharmacies</span></a>
        <a href="../login.html" class="logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </nav>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Supplier Management</h1>
        <p>Manage medicine suppliers, contact details & sourcing categories</p>
    </div>

    <!-- Search -->
    <div class="search-card">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-name" placeholder="Search by supplier name, contact person or email..." onkeyup="searchTable()">
        </div>
    </div>

    <!-- Form -->
    <div class="card">
        <h3><i class="fas fa-truck-loading"></i> Add / Edit Supplier</h3>

        <div class="form-group">
            <label>Supplier ID (auto-generated)</label>
            <input id="sup-id" type="text" readonly placeholder="Auto-generated">
        </div>

        <div class="form-group">
            <label>Supplier Name *</label>
            <input id="sup-name" type="text" placeholder="e.g. MediGlobal Distributors">
        </div>

        <div class="form-group">
            <label>Contact Person</label>
            <input id="sup-contact" type="text" placeholder="e.g. Mr. Rajitha Perera">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input id="sup-phone" type="tel" placeholder="e.g. +94 77 123 4567">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input id="sup-email" type="email" placeholder="e.g. sales@mediglobal.lk">
        </div>

        <div class="form-group">
            <label>Category</label>
            <input id="sup-category" type="text" placeholder="e.g. Local / International / Both">
        </div>

        <div class="button-group">
            <button id="saveBtn" onclick="saveSupplier()"><i class="fas fa-save"></i> Save New</button>
            <button id="updateBtn" onclick="updateSupplier()"><i class="fas fa-edit"></i> Update</button>
            <button id="deleteBtn" onclick="deleteSupplier()"><i class="fas fa-trash"></i> Delete</button>
        </div>
    </div>

    <!-- Table -->
    <div class="table-card">
        <div class="table-header">
            <h3>All Suppliers</h3>
        </div>

        <table id="supplierTable">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact Person</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<script src="../js/jquery-3.6.4.min.js"></script>
<script>
    const API_URL = "http://localhost:8085/api/suppliers";

    $(document).ready(() => getAll());

    function getAll() {
        $.get(API_URL, (resp) => renderTable(resp.data));
    }

    function searchSupplier() {
        const name = $("#search-name").val();
        if(name === "") return getAll();
        $.get(`${API_URL}/search?name=${name}`, (resp) => renderTable(resp.data));
    }

    function renderTable(data) {
        let rows = "";
        data.forEach(s => {
            rows += `<tr><td>${
                s.id}</td><td>${
                s.name}</td><td>${
                s.contactPerson}</td><td>${
                s.phoneNumber}</td><td>${
                s.category}</td>
            <td><button style="background:#7f8c8d; color:white; border:none; padding:5px; border-radius:4px;" onclick="loadFields(${s.id},'${s.name}','${s.contactPerson}','${s.phoneNumber}','${s.email}','${s.category}')">Edit</button></td></tr>`;
        });
        $("#supplierTable tbody").html(rows);
    }

    function saveSupplier() {
        const data = {
            name: $("#sup-name").val(),
            contactPerson: $("#sup-contact").val(),
            phoneNumber: $("#sup-phone").val(),
            email: $("#sup-email").val(),
            category: $("#sup-category").val() };
        $.ajax({
            url: API_URL,
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data), success: () => { alert("Supplier Saved!"); getAll(); clear(); } });
    }

    function updateSupplier() {
        const id = $("#sup-id").val();
        const data = {
            name: $("#sup-name").val(),
            contactPerson: $("#sup-contact").val(),
            phoneNumber: $("#sup-phone").val(),
            email: $("#sup-email").val(),
            category: $("#sup-category").val() };
        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data), success: () => { alert("Updated!"); getAll(); clear(); } });
    }

    function deleteSupplier() {
        const id = $("#sup-id").val();
        $.ajax({ url: `${API_URL}/${id}`,
            method: 'DELETE', success: () => { alert("Deleted!"); getAll(); clear(); } });
    }

    function loadFields(id, n, c, p, e, cat) { $("#sup-id").val(id); $("#sup-name").val(n); $("#sup-contact").val(c); $("#sup-phone").val(p); $("#sup-email").val(e); $("#sup-category").val(cat); }
    function clear() { $("input").val(""); }
</script>
</body>
</html>
