<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Med-Trace | All Scan Records</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root { --primary: #2ecc71; --dark: #0f172a; --bg: #f8fafc; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
    .nav { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f1f5f9; padding: 15px; text-align: left; color: #64748b; font-size: 0.85rem; }
    td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #dcfce7; color: #166534; }
  </style>
</head>
<body>

<div class="nav">
  <div style="font-weight: 700;">Med-Trace ADMIN</div>
  <a href="../index.html" style="color: white; text-decoration: none;"><i class="fas fa-arrow-left"></i> Dashboard</a>
</div>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h1>All Verification Records</h1>
    <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer; border-radius: 8px; border: 1px solid #cbd5e1; background: white;">
      <i class="fas fa-print"></i> Print Report
    </button>
  </div>

  <div class="card">
    <table>
      <thead>
      <tr>
        <th>Date & Time</th>
        <th>Medicine</th>
        <th>Batch No</th>
        <th>Scanned By (Customer)</th>
        <th>Manufacturer</th>
        <th>Status</th>
      </tr>
      </thead>
      <tbody id="adminScanTable">
      </tbody>
    </table>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script>
  $(document).ready(function() {
    $.get("http://localhost:8085/api/scans/all", function(resp) {
      let rows = "";
      resp.data.forEach(item => {
        rows += `
                    <tr>
                        <td>${new Date(item.scanDate).toLocaleString()}</td>
                        <td><strong>${item.medicineName}</strong></td>
                        <td><code>${item.batchNo}</code></td>
                        <td><i class="fas fa-user-circle"></i> ${item.customerName}</td>
                        <td>${item.manufacturer}</td>
                        <td><span class="badge">${item.status}</span></td>
                    </tr>
                `;
      });
      $("#adminScanTable").html(rows);
    });
  });
</script>
</body>
</html>
