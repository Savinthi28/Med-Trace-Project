<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Med-Trace | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; color: var(--text);
        }

        .login-container { width: 100%; max-width: 400px; }

        .login-box {
            background: var(--card); border-radius: 20px; padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }

        .logo { font-size: 2.5rem; font-weight: 700; background: linear-gradient(90deg, var(--primary), #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .subtitle { color: var(--text-light); font-size: 0.85rem; margin-bottom: 25px; }

        .auth-type-indicator {
            background: rgba(46, 204, 113, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); }

        input {
            width: 100%; padding: 12px 15px 12px 45px;
            background: rgba(30,41,59,0.6); border: 1px solid rgba(148,163,184,0.2);
            border-radius: 10px; color: white; font-size: 1rem;
        }

        button {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: var(--primary-dark); }

        .customer-portal {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .customer-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="logo">Med-Trace</div>
        <div class="subtitle">Drug Authenticity & Expiry Tracker</div>

        <div class="auth-type-indicator" id="role-tag">Staff Login</div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password">
        </div>

        <button onclick="handleLogin()">Sign In</button>

        <div class="customer-portal">
            <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 10px;">Are you a Customer?</p>
            <a href="page/customer_login.html" class="customer-link">
                <i class="fas fa-qrcode"></i> Go to Customer Verification
            </a>
        </div>
    </div>
</div>

<script src="js/jquery-3.6.4.min.js"></script>
<script>
    const API_URL = "http://localhost:8085/api/users";

    function handleLogin() {
        const username = $("#username").val();
        const password = $("#password").val();


        if (!username || !password) {
            alert("Please enter credentials!");
            return;
        }

        $.post(`${API_URL}/login?username=${username}&password=${password}`, (resp) => {
            if (resp.data.role === "ADMIN") {
                alert("Staff Login Successful!");
                window.location.href = "index.html";
            } else {
                alert("Access Denied: This portal is for Staff only. Please use the Customer link.");
            }
        }).fail(() => alert("Invalid Username or Password!"));

    }
</script>
</body>
</html>
